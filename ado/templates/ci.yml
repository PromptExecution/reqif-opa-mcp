parameters:
  - name: pythonVersion
    type: string
    default: '3.10'
  - name: artifactRoot
    type: string
    default: 'artifacts'

jobs:
  - job: ci
    displayName: CI
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self

      - task: UsePythonVersion@0
        inputs:
          versionSpec: ${{ parameters.pythonVersion }}

      - task: Cache@2
        inputs:
          key: 'uv | "$(Agent.OS)" | uv.lock'
          restoreKeys: |
            uv | "$(Agent.OS)"
          path: $(Build.SourcesDirectory)/.uv-cache

      - bash: |
          set -euo pipefail
          ./scripts/install_ci_tools.sh
          echo "##vso[task.prependpath]$HOME/.local/bin"
        displayName: Install uv, just, and OPA

      - bash: |
          set -euo pipefail
          mkdir -p ${{ parameters.artifactRoot }}/tests
          export PATH="$HOME/.local/bin:$PATH"
          export UV_CACHE_DIR=.uv-cache
          uv sync
          just ci-check "${{ parameters.artifactRoot }}/tests/junit.xml"
          uv run ruff check . > "${{ parameters.artifactRoot }}/tests/ruff.txt"
          uv run mypy reqif_mcp reqif_ingest_cli > "${{ parameters.artifactRoot }}/tests/mypy.txt"
        displayName: Run checks and emit JUnit

      - task: PublishTestResults@2
        inputs:
          testResultsFormat: JUnit
          testResultsFiles: '${{ parameters.artifactRoot }}/tests/junit.xml'
          failTaskOnFailedTests: true
          testRunTitle: reqif-opa-mcp pytest

      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: '${{ parameters.artifactRoot }}/tests'
          artifact: tests
          publishLocation: pipeline
