name: Compliance Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compliance-gate:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          sudo mv opa /usr/local/bin/
          opa version

      - name: Install project dependencies
        run: uv sync

      - name: Run agent to produce facts
        id: agent
        continue-on-error: true
        run: |
          set +e
          uv run python agents/stub_agent.py --subtype CYBER > agent_facts.json 2> agent_facts.stderr
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -eq 0 ]; then
            echo "Agent facts generated"
            cat agent_facts.json
          else
            echo "Agent fact generation failed with exit code $status"
            cat agent_facts.stderr || true
          fi

      - name: Run compliance gate
        id: evaluate
        if: always()
        run: |
          uv run python -m reqif_mcp.compliance_gate \
            --reqif-path tests/fixtures/sample_baseline.reqif \
            --facts-path agent_facts.json \
            --bundle-path opa-bundles/example \
            --subtype CYBER \
            --package cyber.access_control.v3 \
            --baseline-id CI-BASELINE-2024 \
            --baseline-version 1.0.0 \
            --out-dir compliance_gate_output

      - name: Append compliance summary to job summary
        if: always() && hashFiles('compliance_gate_output/compliance_summary.md') != ''
        run: cat compliance_gate_output/compliance_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('compliance_gate_output/merged.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: compliance_gate_output/merged.sarif
          category: compliance-gate

      - name: Upload evidence store artifacts
        id: upload_evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-evidence
          path: |
            compliance_gate_output/
            agent_facts.json
            agent_facts.stderr
          retention-days: 90

      - name: Comment on PR with compliance results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVIDENCE_ARTIFACT_URL: ${{ steps.upload_evidence.outputs.artifact-url }}
        with:
          script: |
            const fs = require('fs');

            let summary;
            let results = [];
            try {
              summary = JSON.parse(
                fs.readFileSync('compliance_gate_output/compliance_summary.json', 'utf8')
              );
            } catch (e) {
              console.log('No compliance summary found');
              return;
            }

            try {
              results = JSON.parse(
                fs.readFileSync('compliance_gate_output/compliance_results.json', 'utf8')
              );
            } catch (e) {
              results = [];
            }

            const pullNumber = context.payload.pull_request?.number ?? context.issue.number;
            if (!pullNumber) {
              core.info('No pull request number found; skipping PR comment.');
              return;
            }

            const passed = results.filter(r => r.status === 'pass').length;
            const failed = results.filter(r => r.status === 'fail').length;
            const conditional = results.filter(r => r.status === 'conditional_pass').length;
            const total = results.length;
            const statusIcon = summary.gate_status === 'passed' ? '✅' : '❌';
            const workflowRunUrl = process.env.WORKFLOW_RUN_URL;
            const evidenceArtifactUrl = process.env.EVIDENCE_ARTIFACT_URL;

            const formatIssues = (title, issues) => {
              if (!issues || issues.length === 0) {
                return '';
              }
              const lines = issues.map(issue => {
                const requirement = issue.requirement_key || issue.requirement_uid || 'global';
                return `- ${issue.code} [${requirement}] ${issue.message}`;
              });
              return `\n**${title}:**\n${lines.join('\n')}\n`;
            };

            const detailRows = results.length > 0
              ? results.map(
                  r => `| ${r.requirement_key || r.requirement_uid} | ${r.status} | ${r.score.toFixed(2)} |`
                ).join('\n')
              : '| none | n/a | n/a |';

            const links = [
              `- [Workflow run](${workflowRunUrl})`,
              evidenceArtifactUrl
                ? `- [Compliance evidence artifact](${evidenceArtifactUrl})`
                : '- Compliance evidence artifact: not available for this run',
            ].join('\n');

            const comment = `## ${statusIcon} Compliance Gate Results

            **Summary:**
            - Gate status: ${summary.gate_status}
            - Agent exit code: ${'${{ steps.agent.outputs.exit_code }}' || 'unknown'}
            - Baseline requirements: ${summary.baseline_requirement_count}
            - Selected requirements: ${summary.selected_requirement_count}
            - Attempted evaluations: ${summary.attempted_evaluations}
            - Successful evaluations: ${summary.successful_evaluations}
            - Verification events written: ${summary.verification_events_written}
            - Meta-policy failures: ${summary.meta_policy_failure_count}
            - Processing failures: ${summary.processing_failure_count}
            - Gate failures: ${summary.gate_failure_count}
            - ✅ Passed: ${passed}
            - ❌ Failed: ${failed}
            - ⚠️ Conditional: ${conditional}
            - Total requirements evaluated: ${total}

            ${formatIssues('Meta-policy failures', summary.meta_policy_failures)}
            ${formatIssues('Processing failures', summary.processing_failures)}
            ${formatIssues('Gate failures', summary.gate_failures)}

            **Details:**

            | Requirement | Status | Score |
            |-------------|--------|-------|
            ${detailRows}

            **Artifacts and run links:**
            ${links}

            The compliance evidence artifact contains the complete SARIF reports, summary JSON, and evidence bundle for this run.
            `;

            await github.rest.issues.createComment({
              issue_number: pullNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
